experiment:
  name: nasa_battery_processed_ptcn
  seed: 42
  output_dir: outputs/nasa_battery_processed_ptcn

data:
  dataset: nasa_battery
  csv_path: data/processed/nasa_battery.csv
  window_size: 32
  stride: 1
  max_rul: 500
  train_ratio: 0.5
  val_ratio: 0.25
  test_ratio: 0.25
  soh_eol: 0.8
  feature_columns:
    - voltage
    - current
    - temperature
    - capacity
    - internal_resistance

model:
  name: p_tcn
  input_channels: 5
  hidden_channels: 64
  kernel_size: 3
  dilations: [1, 2, 4, 8, 16]
  dropout: 0.1
  output_dim: 1

train:
  epochs: 30
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  device: auto

metrics:
  alpha: 0.2
  lambdas: [0.5, 0.8]

conformal:
  enabled: true
  alpha: 0.1
