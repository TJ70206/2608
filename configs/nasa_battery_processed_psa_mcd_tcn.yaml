experiment:
  name: nasa_battery_processed_psa_mcd_tcn
  seed: 42
  output_dir: outputs/nasa_battery_processed_psa_mcd_tcn

data:
  dataset: nasa_battery
  csv_path: data/processed/nasa_battery.csv
  window_size: 32
  stride: 1
  max_rul: 500
  train_ratio: 0.5
  val_ratio: 0.25
  test_ratio: 0.25
  soh_eol: 0.8
  feature_columns:
    - voltage
    - current
    - temperature
    - capacity
    - internal_resistance

model:
  name: p_sa_mcd_tcn
  input_channels: 5
  hidden_channels: 32
  kernel_size: 3
  dilations: [1, 2, 4, 8, 16]
  dropout: 0.15
  output_dim: 1
  attention_heads: 4
  use_temporal_attention: true
  use_channel_attention: true
  use_temporal_descriptors: true
  use_stage_head: true
  num_stages: 3

train:
  epochs: 50
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  stage_loss_weight: 0.0
  checkpoint_metric: rmse
  checkpoint_mode: min
  checkpoint_min_epoch: 5
  early_stopping_patience: 15
  early_stopping_min_delta: 0.0
  device: auto

metrics:
  alpha: 0.2
  lambdas: [0.5, 0.8]

conformal:
  enabled: true
  alpha: 0.1
