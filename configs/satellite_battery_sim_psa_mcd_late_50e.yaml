experiment:
  name: satellite_battery_sim_psa_mcd_late_50e
  seed: 202608
  output_dir: outputs/second_transfer_50e/satellite_battery_sim_psa_mcd_late_50e

data:
  dataset: satellite_battery_sim
  satellite_battery_csv_path: data/simulated/satellite_battery/satellite_battery_sim.csv
  target_train_split: train
  target_val_split: val
  target_test_split: test
  feature_protocol: telemetry_only
  feature_columns:
    - voltage
    - current
    - temperature
  target_column: normalized_rul
  window_size: 32
  stride: 96
  max_rul: null
  normalize: zscore

model:
  name: p_sa_mcd_tcn
  input_channels: 3
  hidden_channels: 32
  kernel_size: 3
  dilations: [1, 2, 4, 8]
  dropout: 0.15
  output_dim: 1
  attention_heads: 4
  use_temporal_attention: true
  use_channel_attention: true
  use_temporal_descriptors: true
  use_stage_head: true
  num_stages: 3

train:
  epochs: 50
  batch_size: 64
  optimizer: adamw
  loss: smooth_l1
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  late_stage_weight: 1.5
  late_stage_threshold: 2
  late_prediction_weight: 1.05
  checkpoint_metric: weighted
  checkpoint_metric_weights:
    rmse: 0.75
    last_window_rmse: 0.25
  checkpoint_mode: min
  device: auto

metrics:
  alpha: 0.2
  lambdas: [0.5, 0.8]

conformal:
  enabled: false
  alpha: 0.1
